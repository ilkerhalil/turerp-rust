# Lefthook configuration for Turerp ERP
# https://github.com/evilmartians/lefthook

# Pre-commit hooks run before each commit
# Commands run in parallel by default; keep them independent
pre-commit:
  commands:
    format:
      run: cargo fmt --check
      root: turerp/
      stage_fixed: true
      fail_text: |
        Code is not formatted. Run `cargo fmt` to fix.
    clippy:
      run: cargo clippy -- -D warnings
      root: turerp/
      fail_text: |
        Clippy found issues. Fix them before committing.
    gen-openapi:
      run: cargo run --bin gen_openapi && git add openapi.json
      root: turerp/
      fail_text: |
        OpenAPI spec generation failed. Check for schema compilation errors.

# Post-commit hooks run AFTER a commit is created. A non-zero exit does NOT
# revert the commit, so this is the right place for best-effort cleanup that
# must never block development.
#
# cargo-sweep prunes Rust build artifacts older than one day from target/,
# keeping today's incremental cache intact so the next build stays fast while
# target/ stays bounded. The `command -v` guard makes the hook a silent no-op
# for contributors who haven't installed cargo-sweep (`cargo install
# cargo-sweep`), and the trailing `|| true` ensures a sweep error never
# surfaces as a failed hook.
post-commit:
  commands:
    sweep-target:
      run: command -v cargo-sweep >/dev/null 2>&1 && cargo sweep --time 1 || true
      root: turerp/

# Pre-push hooks run before pushing to remote
pre-push:
  parallel: false
  commands:
    test:
      run: cargo test --verbose
      root: turerp/
      fail_text: |
        Tests failed. Fix them before pushing.
    security:
      # RUSTSEC-2023-0071: rsa Marvin Attack - only affects sqlx-mysql which we don't use
      # RUSTSEC-2026-0194/0195: quick-xml 0.32 transitive via rust-s3/aws-creds; S3FileStorage is not wired
      run: cargo audit --ignore RUSTSEC-2023-0071 --ignore RUSTSEC-2026-0194 --ignore RUSTSEC-2026-0195
      root: turerp/
      fail_text: |
        Security vulnerabilities found. Run 'cargo audit' for details.

# Commit-msg hooks validate commit messages
commit-msg:
  commands:
    conventional:
      run: |
        # Check if commit message follows conventional commits
        # Format: type(scope): description
        # Examples: feat: add rate limiting, fix: auth bug, docs: update README
        cat {1} | grep -qE "^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\(.+\))?: .+" || {
          echo "Commit message must follow conventional commits format:"
          echo "  type(scope): description"
          echo ""
          echo "Types: feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert"
          echo "Example: feat: add rate limiting middleware"
          exit 1
        }