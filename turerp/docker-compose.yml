version: '3.8'

services:
  turerp:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://turerp:turerp@db:5432/turerp
      - REDIS_URL=redis://cache:6379
      - RUST_LOG=info
      - PORT=8080
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set}
      - TURERP_OTLP_ENABLED=true
      - TURERP_OTLP_ENDPOINT=http://aspire-dashboard:4317
      - ASPIRE_DASHBOARD_URL=http://localhost:18888
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_started
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - turerp-network

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=turerp
      - POSTGRES_PASSWORD=turerp
      - POSTGRES_DB=turerp
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U turerp"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - turerp-network

  cache:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - turerp-network

  # HashiCorp Vault (dev mode) for secrets management
  vault:
    image: hashicorp/vault:latest
    container_name: turerp-vault
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: myroot
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    cap_add:
      - IPC_LOCK
    volumes:
      - ./vault-data:/vault/file
      - ./scripts/vault-init.sh:/vault-init.sh:ro
    command: >
      sh -c "
        vault server -dev -dev-root-token-id=$${VAULT_DEV_ROOT_TOKEN_ID} -dev-listen-address=$${VAULT_DEV_LISTEN_ADDRESS} &
        sleep 2
        export VAULT_ADDR=http://127.0.0.1:8200
        export VAULT_TOKEN=$${VAULT_DEV_ROOT_TOKEN_ID}
        /vault-init.sh
        wait
      "
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - turerp-network

  # Aspire Dashboard for OTLP observability
  # WARNING: DOTNET_DASHBOARD_UNSECURE_ALLOW_ANONYMOUS disables authentication.
  # This is acceptable for local development only. In production, remove this
  # flag and place the dashboard behind an authenticated reverse proxy.
  aspire-dashboard:
    image: mcr.microsoft.com/dotnet/aspire-dashboard:9.0
    ports:
      - "18888:18888"   # Web UI
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP
    environment:
      - DOTNET_DASHBOARD_UNSECURE_ALLOW_ANONYMOUS=true
      - DOTNET_DASHBOARD_OTLP_ENDPOINT_URL=http://0.0.0.0:4317
    networks:
      - turerp-network

  # Development service
  dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    command: tail -f /dev/null
    volumes:
      - .:/build
      - cargo-cache:/root/.cargo
    environment:
      - RUST_LOG=debug
    networks:
      - turerp-network

volumes:
  postgres_data:
  redis_data:
  cargo-cache:

networks:
  turerp-network:
    driver: bridge