version: '3.8'

services:
  turerp:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://turerp:turerp@db:5432/turerp
      - REDIS_URL=redis://cache:6379
      - RUST_LOG=info
      - PORT=8080
      - JWT_SECRET=${JWT_SECRET:-your-secret-key-change-in-production}
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_started
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - turerp-network

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=turerp
      - POSTGRES_PASSWORD=turerp
      - POSTGRES_DB=turerp
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U turerp"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - turerp-network

  cache:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - turerp-network

  # Development service
  dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    command: tail -f /dev/null
    volumes:
      - .:/build
      - cargo-cache:/root/.cargo
    environment:
      - RUST_LOG=debug
    networks:
      - turerp-network

volumes:
  postgres_data:
  redis_data:
  cargo-cache:

networks:
  turerp-network:
    driver: bridge